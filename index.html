<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=location_on"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <h5>Track time across different cities around the globe</h2>
        <select class="city-selector" id="city-selector">
          <option value="">Select a city...</option>
          <option value="Asia/Tokyo">Tokyo</option>
          <option value="America/Argentina/San_Juan">San Juan</option>
          <option value="Africa/Nairobi">Nairobi</option>
        </select>
      <div class="clock-cubes" id="cities">
        <div>
          <div class="city">
            <span class="material-symbols-outlined"> location_on </span> London
          </div>
          <div class="time" id="london-time"></div>
          <div class="date" id="london-date"></div>
        </div>
        <div>
          <div class="city">
            <span class="material-symbols-outlined"> location_on </span> Hobart
          </div>
          <div class="time" id="hobart-time"></div>
          <div class="date" id="hobart-date"></div>
        </div>
      </div>
    </div>
    <footer>
      This project was coded by
      <a href="https://github.com/Bonnie136" target="_blank">Bonnie Wells</a>,
      open sourced <a href="#">on GitHub</a> and hosted
      <a href="#">by Netlify</a>
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
